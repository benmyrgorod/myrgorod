    <title>Contact - Ben Myrgorod</title>

  <body>
    <nav role="navigation" aria-label="Main menu" class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <img alt="Logo" src="img/icon/check-mark.png" class="mr-3" heigh="25px" width="25px">
      <span class="navbar-brand">Ben Myrgorod</span>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
          <a class="nav-item nav-link" href="index.htm">Home</a>
          <a aria-selected="true" class="nav-item nav-link active" href="contact.htm">Contact</a>
        </div>
      </div>
    </nav>

    <div role="complementary" aria-label="Contact form" class="mt-4 mb-4">
      <div class="container">
        <h1 class="display-5">Contact</h1>

        <p class="lead">Please, use the form below to contact me or request services.</p>
        <div class="contact-soundbar">
          <button type="button" class="btn btn-outline-primary contact-music-toggle" aria-pressed="false" data-contact-music>
            <span class="contact-music-icon" aria-hidden="true"></span>
            <span data-contact-music-label>Play MIDI mood</span>
          </button>
        </div>

        <form action="https://formspree.io/f/mrgngokp" method="POST" accept-charset="UTF-8" >
          <div class="form-group">
            <label for="name">Your name:</label>
            <input type="input" class="form-control" name="name" id="name" placeholder="" >
          </div>
          <div class="form-group">
            <label for="email">Email address:</label>
            <input type="email" class="form-control" name="email" id="email" placeholder="" >
          </div>
          <div class="form-group">
            <label for="message">Message:</label>
            <textarea class="form-control" name="message" id="message" rows="5"></textarea>
          </div>
          <button type="submit" class="btn btn-primary mb-2">Send</button>
        </form>
      </div>
    </div>

    <footer role="contentinfo" aria-label="Footer navigation" class="jumbotron text-muted mb-0 pt-4 pb-2">
      <div class="container">
        <p class="float-right">
          <a href="#">Back to top</a>
        </p>
        <p>© 2026 Ben Myrgorod</p>
      </div>
    </footer>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script>
      (function () {
        var button = document.querySelector("[data-contact-music]");
        var label = document.querySelector("[data-contact-music-label]");
        var audioContext = null;
        var timer = null;
        var step = 0;
        var isPlaying = false;
        var isStarting = false;
        var pendingAutoplay = false;
        var melody = [69, 72, 71, 67, 64, 67, 69, null, 67, 69, 71, 74, 72, 67, 64, null];
        var bass = [45, null, 45, null, 43, null, 43, null, 40, null, 40, null, 43, null, 45, null];
        var tempo = 190;

        function frequencyFromMidi(note) {
          return 440 * Math.pow(2, (note - 69) / 12);
        }

        function playNote(note, duration, type, volume) {
          if (note === null || !audioContext) {
            return;
          }

          var now = audioContext.currentTime;
          var oscillator = audioContext.createOscillator();
          var gain = audioContext.createGain();

          oscillator.type = type;
          oscillator.frequency.setValueAtTime(frequencyFromMidi(note), now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(volume, now + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(now);
          oscillator.stop(now + duration + 0.02);
        }

        function tick() {
          if (!isPlaying) {
            return;
          }

          playNote(melody[step % melody.length], 0.14, "square", 0.055);

          if (step % 2 === 0) {
            playNote(bass[step % bass.length], 0.22, "triangle", 0.05);
          }

          if (step % 8 === 4) {
            playNote(melody[(step + 5) % melody.length] - 12, 0.18, "sine", 0.025);
          }

          step += 1;
          timer = window.setTimeout(tick, tempo);
        }

        function markPlaying() {
          isPlaying = true;
          isStarting = false;
          pendingAutoplay = false;
          button.setAttribute("aria-pressed", "true");
          label.textContent = "Pause MIDI mood";
          document.body.classList.add("contact-music-playing");
          tick();
        }

        function markReady() {
          isPlaying = false;
          isStarting = false;
          button.setAttribute("aria-pressed", "false");
          label.textContent = "Play MIDI mood";
          document.body.classList.remove("contact-music-playing");
        }

        function startMusic() {
          if (isPlaying || isStarting) {
            return;
          }

          isStarting = true;
          audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
          audioContext.resume().then(function () {
            if (audioContext.state === "running") {
              markPlaying();
              return;
            }

            pendingAutoplay = true;
            markReady();
          }).catch(function () {
            pendingAutoplay = true;
            markReady();
          });
        }

        function stopMusic() {
          isPlaying = false;
          isStarting = false;
          window.clearTimeout(timer);
          button.setAttribute("aria-pressed", "false");
          label.textContent = "Play MIDI mood";
          document.body.classList.remove("contact-music-playing");
        }

        function startAfterGesture() {
          if (!pendingAutoplay || isPlaying) {
            return;
          }

          startMusic();
          document.removeEventListener("pointerdown", startAfterGesture);
          document.removeEventListener("keydown", startAfterGesture);
        }

        if (button) {
          button.addEventListener("click", function () {
            if (isPlaying) {
              stopMusic();
              return;
            }

            startMusic();
          });

          window.setTimeout(function () {
            startMusic();
            window.setTimeout(function () {
              if (!isPlaying) {
                pendingAutoplay = true;
                document.addEventListener("pointerdown", startAfterGesture);
                document.addEventListener("keydown", startAfterGesture);
              }
            }, 600);
          }, 300);

          window.addEventListener("pagehide", stopMusic);
        }
      }());
    </script>
  </body>
</html>
